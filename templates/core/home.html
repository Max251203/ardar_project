{% extends "base.html" %}
{% block content %}
<h2>Последние статьи</h2>
{% if articles %}
<div class="card-grid">
    {% for article in articles %}
    {% include "articles/_card.html" %}
    {% endfor %}
</div>
{% else %}
<p>Пока статей нет.</p>
{% endif %}


<style>
    .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
        margin-bottom: 40px;
    }

    .card {
        border: 1px solid var(--border, #e5e7eb);
        border-radius: 10px;
        overflow: hidden;
        background: var(--card, #f9f9f9);
        display: flex;
        flex-direction: column;
        height: 450px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .card-image-container {
        height: 200px;
        min-height: 200px;
        background-color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    .card-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .card-image-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64748b;
        font-size: 15px;
        background: #e2e8f0;
    }

    .card-content {
        padding: 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .card-title {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 18px;
        line-height: 1.3;
        height: 47px;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
    }

    .card-meta {
        display: flex;
        flex-direction: column;
        gap: 5px;
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 12px;
    }

    .card-excerpt {
        color: var(--text, #111827);
        margin-bottom: 15px;
        flex-grow: 1;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        font-size: 14px;
        line-height: 1.5;
    }

    .card-footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .read-more {
        display: inline-block;
        color: var(--primary, #2563eb);
        font-weight: 500;
        text-decoration: none;
    }

    .read-more:hover {
        text-decoration: underline;
    }

    .pending {
        color: #f59e0b;
        font-weight: 500;
        font-size: 13px;
    }

    .add-article-btn {
        margin-top: 30px;
        text-align: center;
    }

    .btn-create {
        display: inline-block;
        padding: 12px 24px;
        background-color: var(--primary, #2563eb);
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        transition: background-color 0.2s;
    }

    .btn-create:hover {
        opacity: 0.9;
    }

    @media (max-width: 768px) {
        .card-grid {
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        }

        .card {
            height: 420px;
        }
    }

    @media (max-width: 480px) {
        .card-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

{% endblock %}
