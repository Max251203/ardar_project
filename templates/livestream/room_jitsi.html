{% extends "base.html" %}
{% block title %}{{ room.name }} — Трансляция{% endblock %}
{% block content %}
<div class="livestream-container" style="display: flex; gap: 20px;">
    <div class="video-container" style="flex: 2;">
        <iframe
            src="https://meet.jit.si/{{ room.channel_id }}?config.disableDeepLinking=true&config.prejoinPageEnabled=false&userInfo.displayName={{ user_name }}"
            allow="camera; microphone; fullscreen; display-capture; autoplay"
            style="width:100%; height:600px; border:0;">
        </iframe>
    </div>
    <div class="side-panel" style="flex: 1; min-width: 350px; max-width: 400px; display: flex; flex-direction: column; gap: 20px;">
        <div class="users-panel">
            <h4>Участники</h4>
            <div id="users-list"></div>
            {% if is_host %}
            <div class="invite-panel">
                <input type="text" id="invite-search" placeholder="Поиск пользователя...">
                <div id="invite-results"></div>
            </div>
            {% endif %}
        </div>
        <div class="chat-panel">
            <div class="chat-messages" id="chat-messages"></div>
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Сообщение..." autocomplete="off">
                <button type="submit">Отправить</button>
            </form>
        </div>
    </div>
</div>
{% if is_host %}
<div class="host-controls" style="margin-top: 20px; text-align: center;">
    <a href="{% url 'end_livestream' room.id %}" class="btn-end" onclick="return confirm('Вы уверены, что хотите завершить трансляцию?')">Завершить трансляцию</a>
</div>
{% endif %}
<script src="https://cdn.agora.io/sdk/release/AgoraRTC_N.js"></script>
<script>
    const appId = "{{ app_id }}";
    const channel = "{{ room.channel_id }}";
    const uid = parseInt("{{ user_id }}");
    const userName = "{{ user_name }}";
    const isHost = {{ is_host|yesno:"true,false" }};
    const roomType = "{{ room.type }}";
    let token = "";

    document.addEventListener('DOMContentLoaded', async function() {
        const role = isHost ? 1 : 2;
        const response = await fetch("{% url 'generate_token' %}?channel=" + channel + "&uid=" + uid + "&role=" + role);
        const data = await response.json();
        token = data.token;

        const client = AgoraRTC.createClient({ mode: roomType === 'broadcast' ? 'live' : 'rtc', codec: 'vp8' });
        if (roomType === 'broadcast') {
            client.setClientRole(isHost ? 'host' : 'audience');
        }
        await client.join(appId, channel, token, uid);

        let localTracks = { audioTrack: null, videoTrack: null };
        let localTrackState = { audioTrackMuted: false, videoTrackMuted: false };
        let remoteUsers = {};

        if (isHost || roomType === 'conference') {
            [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
            const playerContainer = document.createElement('div');
            playerContainer.id = `user-${uid}`;
            playerContainer.classList.add('video-player');
            playerContainer.innerHTML = `<div class="user-name">${userName} (Вы)</div>`;
            document.getElementById('agora-video').append(playerContainer);
            localTracks.videoTrack.play(`user-${uid}`);
            await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
        } else {
            document.getElementById('mic-btn').style.display = 'none';
            document.getElementById('camera-btn').style.display = 'none';
        }

        document.getElementById('mic-btn').addEventListener('click', async function() {
            if (!localTracks.audioTrack) return;
            if (localTrackState.audioTrackMuted) {
                await localTracks.audioTrack.setMuted(false);
                localTrackState.audioTrackMuted = false;
                this.classList.remove('muted');
                this.querySelector('.mic-icon').textContent = '🎤';
            } else {
                await localTracks.audioTrack.setMuted(true);
                localTrackState.audioTrackMuted = true;
                this.classList.add('muted');
                this.querySelector('.mic-icon').textContent = '🔇';
            }
        });

        document.getElementById('camera-btn').addEventListener('click', async function() {
            if (!localTracks.videoTrack) return;
            if (localTrackState.videoTrackMuted) {
                await localTracks.videoTrack.setMuted(false);
                localTrackState.videoTrackMuted = false;
                this.classList.remove('muted');
                this.querySelector('.camera-icon').textContent = '📹';
            } else {
                await localTracks.videoTrack.setMuted(true);
                localTrackState.videoTrackMuted = true;
                this.classList.add('muted');
                this.querySelector('.camera-icon').textContent = '🚫';
            }
        });

        document.getElementById('leave-btn').addEventListener('click', async function() {
            for (const trackName in localTracks) {
                const track = localTracks[trackName];
                if (track) {
                    track.stop();
                    track.close();
                    localTracks[trackName] = null;
                }
            }
            await client.leave();
            window.location.href = "{% url 'livestream_list' %}";
        });

        client.on('user-published', async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === 'video') {
                if (!document.getElementById(`user-${user.uid}`)) {
                    const playerContainer = document.createElement('div');
                    playerContainer.id = `user-${user.uid}`;
                    playerContainer.classList.add('video-player');
                    playerContainer.innerHTML = `<div class="user-name">Пользователь ${user.uid}</div>`;
                    document.getElementById('agora-video').append(playerContainer);
                }
                user.videoTrack.play(`user-${user.uid}`);
            }
            if (mediaType === 'audio') {
                user.audioTrack.play();
            }
            remoteUsers[user.uid] = user;
        });

        client.on('user-unpublished', (user, mediaType) => {
            if (mediaType === 'video') {
                const playerContainer = document.getElementById(`user-${user.uid}`);
                if (playerContainer) playerContainer.remove();
            }
            if (!user.hasAudio && !user.hasVideo) {
                delete remoteUsers[user.uid];
            }
        });
    });

    // Чат
    function loadChat() {
        fetch("{% url 'livestream_chat' room.id %}")
            .then(r => r.json())
            .then(data => {
                const chat = document.getElementById('chat-messages');
                chat.innerHTML = '';
                data.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'chat-message';
                    div.innerHTML = `<b>${msg.user}:</b> ${msg.text} <span class="chat-time">${msg.created}</span>`;
                    chat.appendChild(div);
                });
                chat.scrollTop = chat.scrollHeight;
            });
    }
    document.getElementById('chat-form').onsubmit = function(e) {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        fetch("{% url 'livestream_chat' room.id %}", {
            method: 'POST',
            headers: {'X-CSRFToken': '{{ csrf_token }}'},
            body: new URLSearchParams({text})
        })
        .then(r => r.json())
        .then(msg => {
            input.value = '';
            loadChat();
        });
    };
    setInterval(loadChat, 3000);
    loadChat();

    // Список пользователей
    function loadUsers() {
        fetch("{% url 'livestream_users' room.id %}")
            .then(r => r.json())
            .then(data => {
                const users = document.getElementById('users-list');
                users.innerHTML = '';
                data.users.forEach(u => {
                    users.innerHTML += `<div class="user-row">
                        <span>${u.name}${u.is_host ? ' <b>(Ведущий)</b>' : ''}${u.is_speaker ? ' <i>(Говорит)</i>' : ''}${u.is_muted ? ' <i>(Микрофон выкл.)</i>' : ''}</span>
                        {% if is_host and not u.is_host %}
                            <button onclick="kickUser(${u.id})">Выгнать</button>
                            <button onclick="muteUser(${u.id})">${u.is_muted ? 'Включить' : 'Выключить'} микрофон</button>
                            <button onclick="grantUser(${u.id})">Дать слово</button>
                        {% endif %}
                    </div>`;
                });
            });
    }
    setInterval(loadUsers, 3000);
    loadUsers();
    function kickUser(id) {
        fetch("{% url 'livestream_kick' room.id 0 %}".replace('/0/', '/' + id + '/'), {method: 'POST', headers: {'X-CSRFToken': '{{ csrf_token }}'}}).then(loadUsers);
    }
    function muteUser(id) {
        fetch("{% url 'livestream_mute' room.id 0 %}".replace('/0/', '/' + id + '/'), {method: 'POST', headers: {'X-CSRFToken': '{{ csrf_token }}'}}).then(loadUsers);
    }
    function grantUser(id) {
        fetch("{% url 'livestream_grant' room.id 0 %}".replace('/0/', '/' + id + '/'), {method: 'POST', headers: {'X-CSRFToken': '{{ csrf_token }}'}}).then(loadUsers);
    }

    // Приглашения
    {% if is_host %}
    document.getElementById('invite-search').oninput = function() {
        const q = this.value;
        if (q.length < 2) return;
        fetch("{% url 'livestream_invite' room.id %}?q=" + encodeURIComponent(q))
            .then(r => r.json())
            .then(data => {
                const res = document.getElementById('invite-results');
                res.innerHTML = '';
                data.results.forEach(u => {
                    const btn = document.createElement('button');
                    btn.textContent = 'Пригласить';
                    btn.onclick = function() {
                        fetch("{% url 'livestream_invite' room.id %}", {
                            method: 'POST',
                            headers: {'X-CSRFToken': '{{ csrf_token }}'},
                            body: new URLSearchParams({user_id: u.id})
                        }).then(() => { btn.textContent = 'Приглашён'; btn.disabled = true; });
                    };
                    res.innerHTML += `<div>${u.name} </div>`;
                    res.lastChild.appendChild(btn);
                });
            });
    };
    {% endif %}
</script>
<style>
.video-container { background-color: #1a1a1a; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
#agora-video { width: 100%; min-height: 500px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; padding: 10px; }
.video-player { position: relative; background-color: #2a2a2a; border-radius: 6px; overflow: hidden; aspect-ratio: 16/9; }
.user-name { position: absolute; bottom: 10px; left: 10px; background-color: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 4px; font-size: 14px; }
.video-controls { display: flex; justify-content: center; gap: 20px; padding: 15px; background-color: #2a2a2a; }
.control-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background-color: #444; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.control-btn:hover { background-color: #555; }
.control-btn.muted { background-color: #e53e3e; }
.control-btn.leave { width: auto; border-radius: 25px; padding: 0 20px; background-color: #e53e3e; }
.side-panel { min-width: 350px; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
.users-panel, .chat-panel { background: var(--card); border-radius: 8px; padding: 10px; }
.chat-messages { flex: 1; overflow-y: auto; margin-bottom: 10px; height: 200px; }
.chat-message { margin-bottom: 5px; }
.chat-time { color: #aaa; font-size: 11px; margin-left: 5px; }
.chat-form { display: flex; gap: 5px; }
#chat-input { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid var(--border); }
.users-panel { height: 200px; overflow-y: auto; }
.user-row { margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.user-row button { font-size: 11px; padding: 2px 6px; border-radius: 4px; border: 1px solid #ccc; background: #eee; cursor: pointer; }
.invite-panel { margin: 10px 0; }
#invite-search { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid var(--border); }
#invite-results div { margin-bottom: 5px; }
.btn-end { display: inline-block; padding: 12px 24px; background-color: #e53e3e; color: white; border-radius: 6px; font-weight: 500; }
</style>
{% endblock %}
