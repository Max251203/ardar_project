{% extends "base.html" %}
{% block title %}{{ room.name }} — Трансляция{% endblock %}
{% block content %}
<div class="livestream-main">
    <div class="video-block">
        <div id="agora-video" class="video-area {% if room.type == 'broadcast' %}broadcast-mode{% endif %}"></div>
        <div class="video-controls">
            <button id="mic-btn" class="control-btn" title="Включить/выключить микрофон">
                <i class="mic-icon">🎤</i>
            </button>
            <button id="camera-btn" class="control-btn" title="Включить/выключить камеру">
                <i class="camera-icon">📹</i>
            </button>
            <button id="hand-btn" class="control-btn" style="display: none;" title="Поднять руку">
                <i class="hand-icon">✋</i> Поднять руку
            </button>
            <button id="return-word-btn" class="control-btn return-word" style="display: none;" title="Вернуть слово ведущему">
                <i class="return-icon">🔙</i> Вернуть слово
            </button>
            <button id="leave-btn" class="control-btn leave" title="Покинуть трансляцию">
                <i class="leave-icon">❌</i> Выйти
            </button>
            {% if is_host or user.role == 'admin' or user.is_superuser %}
            <a href="{% url 'end_livestream' room.id %}" class="control-btn end" onclick="return confirm('Вы уверены, что хотите завершить трансляцию?')">
                <i class="end-icon">⏹️</i> Завершить
            </a>
            {% endif %}
        </div>
        <div class="status-bar" id="status-bar">
            <span id="speaker-status"></span>
        </div>
    </div>
    <div class="side-panel">
        <div class="users-panel">
            <div class="users-header">
                <input type="text" id="invite-search" placeholder="Поиск пользователя..." autocomplete="off">
                <div id="invite-results" class="invite-results"></div>
            </div>
            <div class="users-list" id="users-list"></div>
        </div>
        <div class="chat-panel">
            <div class="chat-messages" id="chat-messages"></div>
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Сообщение..." autocomplete="off">
                <button type="submit" class="send-btn">Отправить</button>
            </form>
        </div>
    </div>
</div>
<div id="custom-alert" class="custom-alert" style="display:none;"></div>
<div id="pending-dialog" class="pending-dialog" style="display:none;"></div>
<script src="https://cdn.agora.io/sdk/release/AgoraRTC_N.js"></script>
<script>
const appId = "{{ app_id }}";
const channel = "{{ channel_id }}";
const uid = parseInt("{{ user_id }}");
const userName = "{{ user_name }}";
const isHost = {{ is_host|yesno:"true,false" }};
const roomType = "{{ room.type }}";
let token = "";
let localTracks = { audioTrack: null, videoTrack: null };
let localTrackState = { audioTrackMuted: false, videoTrackMuted: false };
let remoteUsers = {};
let currentSpeakerId = null;
let client = null;
let allUsers = [];
let amISpeaker = false;
let canEnableMic = true;
let canEnableCamera = true;
let handRaised = false;
let statusCheckInterval = null;

function showCustomAlert(msg, type = 'info') {
    let alertDiv = document.getElementById('custom-alert');
    alertDiv.innerHTML = msg;
    alertDiv.className = 'custom-alert ' + type;
    alertDiv.style.display = 'block';
    setTimeout(() => { alertDiv.style.display = 'none'; }, 3500);
}

function showVideo(uid, label, isSpeaker) {
    let container = document.getElementById(`user-${uid}`);
    
    // Получаем правильное имя пользователя
    let displayName = label;
    if (uid === parseInt("{{ room.host.id }}")) {
        displayName = "{{ room.host.name }} (Ведущий)";
    } else if (uid === parseInt("{{ user_id }}")) {
        displayName = "{{ user_name }} (Вы)";
    } else {
        // Пытаемся найти имя в списке пользователей
        const userName = getUserName(uid);
        if (userName) {
            displayName = userName;
        }
    }
    
    if (!container) {
        container = document.createElement('div');
        container.id = `user-${uid}`;
        container.className = 'video-player';
        if (isSpeaker || (roomType === 'broadcast' && uid === parseInt("{{ room.host.id }}"))) {
            container.classList.add('speaking');
        }
        
        container.innerHTML = `
            <div class="user-name">
                ${displayName}
                <div class="user-icons" id="icons-${uid}"></div>
            </div>
            <div id="video-box-${uid}" class="video-box"></div>
        `;
        document.getElementById('agora-video').append(container);
    } else if (isSpeaker || (roomType === 'broadcast' && uid === parseInt("{{ room.host.id }}"))) {
        container.classList.add('speaking');
    } else if (roomType === 'conference') {
        container.classList.remove('speaking');
    }
    
    // Обновляем статус говорящего
    if (isSpeaker && uid !== parseInt("{{ room.host.id }}")) {
        document.getElementById('speaker-status').innerHTML = `Сейчас говорит: <b>${displayName}</b>`;
    } else if (roomType === 'broadcast' && uid === parseInt("{{ room.host.id }}")) {
        document.getElementById('speaker-status').innerHTML = `Ведущий: <b>${displayName}</b>`;
    }
    
    // Показываем/скрываем кнопку "Вернуть слово"
    updateReturnWordButton();
}

function updateUserIcons(uid, isMuted, hasVideo) {
    const iconsContainer = document.getElementById(`icons-${uid}`);
    if (iconsContainer) {
        let html = '';
        if (isMuted) {
            html += '<span class="icon-muted" title="Микрофон выключен">🔇</span>';
        } else {
            html += '<span class="icon-mic" title="Микрофон включен">🎤</span>';
        }
        
        if (!hasVideo) {
            html += '<span class="icon-no-video" title="Камера выключена">🚫</span>';
        } else {
            html += '<span class="icon-video" title="Камера включена">📹</span>';
        }
        
        iconsContainer.innerHTML = html;
    }
}

function removeVideo(uid) {
    const container = document.getElementById(`user-${uid}`);
    if (container) container.remove();
    
    // Если это был говорящий, очищаем статус
    if (currentSpeakerId === uid) {
        document.getElementById('speaker-status').innerHTML = '';
        currentSpeakerId = null;
    }
}

function getUserName(userId) {
    for (let user of allUsers) {
        if (user.id === userId) {
            return user.name;
        }
    }
    return null;
}

function updateReturnWordButton() {
    const returnWordBtn = document.getElementById('return-word-btn');
    if (!returnWordBtn) return;
    
    // Показываем кнопку только если я спикер и не ведущий
    if (amISpeaker && !isHost) {
        returnWordBtn.style.display = 'block';
    } else {
        returnWordBtn.style.display = 'none';
    }
}

function updateMicCameraButtons() {
    const micBtn = document.getElementById('mic-btn');
    const cameraBtn = document.getElementById('camera-btn');
    if (!canEnableMic) {
        micBtn.disabled = true;
        micBtn.classList.add('muted');
        micBtn.title = "Ведущий запретил включать микрофон";
    } else {
        micBtn.disabled = false;
        micBtn.classList.remove('muted');
        micBtn.title = "Включить/выключить микрофон";
    }
    if (!canEnableCamera) {
        cameraBtn.disabled = true;
        cameraBtn.classList.add('muted');
        cameraBtn.title = "Ведущий запретил включать камеру";
    } else {
        cameraBtn.disabled = false;
        cameraBtn.classList.remove('muted');
        cameraBtn.title = "Включить/выключить камеру";
    }
}

function updateHandButton() {
    const handBtn = document.getElementById('hand-btn');
    if (roomType === 'broadcast' && !isHost && !amISpeaker) {
        handBtn.style.display = 'inline-block';
        handBtn.innerHTML = handRaised ? '<i class="hand-icon">✋</i> Опустить руку' : '<i class="hand-icon">✋</i> Поднять руку';
    } else {
        handBtn.style.display = 'none';
    }
}

function checkUserStatus() {
    fetch("/livestream/check_status/{{ room.id }}/?t=" + Date.now())
        .then(response => response.json())
        .then(data => {
            canEnableMic = data.can_enable_mic;
            canEnableCamera = data.can_enable_camera;
            handRaised = data.hand_raised;
            updateMicCameraButtons();
            updateHandButton();
            if (data.is_kicked) {
                localStorage.setItem('kicked_from_room', '1');
                window.location.href = "{% url 'livestream_list' %}";
            }
            if (data.room_ended) {
                localStorage.setItem('stream_ended', '1');
                window.location.href = "{% url 'livestream_list' %}";
            }
        });
}
statusCheckInterval = setInterval(checkUserStatus, 3000);

document.addEventListener('DOMContentLoaded', async function() {
    try {
        const role = isHost ? 1 : 2;
        const response = await fetch("{% url 'generate_token' %}?channel=" + channel + "&uid=" + uid + "&role=" + role);
        const data = await response.json();
        token = data.token;

        client = AgoraRTC.createClient({ mode: roomType === 'broadcast' ? 'live' : 'rtc', codec: 'vp8' });
        
        if (roomType === 'broadcast') {
            client.setClientRole(isHost ? 'host' : 'audience');
        }
        
        await client.join(appId, channel, token, uid);
        showCustomAlert("Вы присоединились к трансляции", "success");

        if (isHost || roomType === 'conference') {
            try {
                [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
                showVideo(uid, userName + " (Вы)", isHost);
                localTracks.videoTrack.play(`video-box-${uid}`);
                updateUserIcons(uid, localTrackState.audioTrackMuted, !localTrackState.videoTrackMuted);
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
            } catch (error) {
                console.error("Ошибка при создании локальных треков:", error);
                showCustomAlert("Не удалось получить доступ к камере или микрофону. Проверьте разрешения браузера.", "error");
                
                // Пробуем создать только аудио трек, если видео не доступно
                try {
                    localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    showVideo(uid, userName + " (Вы)", isHost);
                    updateUserIcons(uid, localTrackState.audioTrackMuted, false);
                    await client.publish([localTracks.audioTrack]);
                } catch (audioError) {
                    console.error("Ошибка при создании аудио трека:", audioError);
                    showCustomAlert("Не удалось получить доступ к микрофону. Вы будете только наблюдать.", "warning");
                    showVideo(uid, userName + " (Вы)", false);
                }
            }
        } else {
            document.getElementById('mic-btn').style.display = 'none';
            document.getElementById('camera-btn').style.display = 'none';
            showVideo(uid, userName + " (Вы)", false);
        }

        document.getElementById('mic-btn').addEventListener('click', async function() {
            if (!canEnableMic) {
                showCustomAlert("Ведущий запретил включать микрофон", "error");
                return;
            }
            if (!localTracks.audioTrack) return;
            if (localTrackState.audioTrackMuted) {
                await localTracks.audioTrack.setMuted(false);
                localTrackState.audioTrackMuted = false;
                this.classList.remove('muted');
                this.querySelector('.mic-icon').textContent = '🎤';
                updateUserIcons(uid, false, !localTrackState.videoTrackMuted);
            } else {
                await localTracks.audioTrack.setMuted(true);
                localTrackState.audioTrackMuted = true;
                this.classList.add('muted');
                this.querySelector('.mic-icon').textContent = '🔇';
                updateUserIcons(uid, true, !localTrackState.videoTrackMuted);
            }
        });

        document.getElementById('camera-btn').addEventListener('click', async function() {
            if (!canEnableCamera) {
                showCustomAlert("Ведущий запретил включать камеру", "error");
                return;
            }
            if (!localTracks.videoTrack) return;
            if (localTrackState.videoTrackMuted) {
                await localTracks.videoTrack.setMuted(false);
                localTrackState.videoTrackMuted = false;
                this.classList.remove('muted');
                this.querySelector('.camera-icon').textContent = '📹';
                updateUserIcons(uid, localTrackState.audioTrackMuted, true);
            } else {
                await localTracks.videoTrack.setMuted(true);
                localTrackState.videoTrackMuted = true;
                this.classList.add('muted');
                this.querySelector('.camera-icon').textContent = '🚫';
                updateUserIcons(uid, localTrackState.audioTrackMuted, false);
            }
        });

        document.getElementById('hand-btn').addEventListener('click', function() {
            if (!handRaised) {
                fetch("/livestream/raise_hand/{{ room.id }}/", {
                    method: 'POST',
                    headers: {'X-CSRFToken': '{{ csrf_token }}'}
                }).then(r => r.json()).then(data => {
                    if (data.success) {
                        handRaised = true;
                        updateHandButton();
                        showCustomAlert("Вы подняли руку. Ожидайте решения ведущего.", "info");
                    }
                });
            } else {
                fetch("/livestream/lower_hand/{{ room.id }}/", {
                    method: 'POST',
                    headers: {'X-CSRFToken': '{{ csrf_token }}'}
                }).then(r => r.json()).then(data => {
                    if (data.success) {
                        handRaised = false;
                        updateHandButton();
                        showCustomAlert("Вы опустили руку.", "info");
                    }
                });
            }
        });

        document.getElementById('return-word-btn').addEventListener('click', function() {
            fetch("/livestream/grant/{{ room.id }}/" + uid + "/", {
                method: 'POST',
                headers: {'X-CSRFToken': '{{ csrf_token }}'}
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    amISpeaker = false;
                    updateReturnWordButton();
                    showCustomAlert("Вы вернули слово ведущему", "success");
                }
            });
        });

        document.getElementById('leave-btn').addEventListener('click', async function() {
            for (const trackName in localTracks) {
                const track = localTracks[trackName];
                if (track) {
                    track.stop();
                    track.close();
                    localTracks[trackName] = null;
                }
            }
            await client.leave();
            window.location.href = "{% url 'livestream_list' %}";
        });

        client.on('user-published', async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            
            if (mediaType === 'video') {
                const isSpeaker = roomType === 'broadcast' && user.uid !== uid && isUserSpeaker(user.uid);
                const isRoomHost = user.uid === parseInt("{{ room.host.id }}");
                showVideo(user.uid, getUserName(user.uid) || user.uid, isSpeaker || isRoomHost);
                user.videoTrack.play(`video-box-${user.uid}`);
                updateUserIcons(user.uid, !user.hasAudio, true);
            }
            
            if (mediaType === 'audio') {
                user.audioTrack.play();
                updateUserIcons(user.uid, false, user.hasVideo);
                
                // Если это трансляция и пользователь является спикером, показываем его как говорящего
                if (roomType === 'broadcast' && user.uid !== uid && isUserSpeaker(user.uid)) {
                    currentSpeakerId = user.uid;
                    const container = document.getElementById(`user-${user.uid}`);
                    if (container) container.classList.add('speaking');
                    document.getElementById('speaker-status').innerHTML = `Сейчас говорит: <b>${getUserName(user.uid) || user.uid}</b>`;
                }
            }
            
            remoteUsers[user.uid] = user;
        });

        client.on('user-unpublished', (user, mediaType) => {
            if (mediaType === 'video') {
                updateUserIcons(user.uid, !user.hasAudio, false);
            }
            
            if (mediaType === 'audio') {
                updateUserIcons(user.uid, true, user.hasVideo);
                
                // Если это был говорящий, очищаем статус
                if (currentSpeakerId === user.uid) {
                    document.getElementById('speaker-status').innerHTML = '';
                    currentSpeakerId = null;
                    const container = document.getElementById(`user-${user.uid}`);
                    if (container) container.classList.remove('speaking');
                }
            }
            
            if (!user.hasAudio && !user.hasVideo) {
                removeVideo(user.uid);
                delete remoteUsers[user.uid];
            }
        });
        
        client.on('user-left', (user) => {
            removeVideo(user.uid);
            delete remoteUsers[user.uid];
            
            // Если ушел ведущий, показываем уведомление
            if (user.uid === parseInt("{{ room.host.id }}")) {
                showCustomAlert("Ведущий покинул трансляцию", "warning");
                // Проверяем, не завершена ли трансляция
                checkUserStatus();
            }
        });
        
        // Обработка ошибок
        client.on('exception', (event) => {
            console.warn(`Agora Exception: ${event.code}, ${event.msg}`);
            if (event.code === 1001) {
                showCustomAlert("Проблема с сетевым подключением. Пытаемся восстановить...", "warning");
            }
        });
        
        // Обработка отключения
        client.on('connection-state-change', (state) => {
            console.log(`Connection state changed to: ${state}`);
            if (state === 'DISCONNECTED') {
                showCustomAlert("Соединение потеряно. Перезагрузите страницу.", "error");
            } else if (state === 'RECONNECTING') {
                showCustomAlert("Переподключение...", "warning");
            } else if (state === 'CONNECTED') {
                showCustomAlert("Соединение восстановлено", "success");
            }
        });

    } catch (error) {
        console.error("Ошибка при инициализации трансляции:", error);
        showCustomAlert("Не удалось подключиться к трансляции: " + error.message, "error");
    }

    // Функция для проверки, является ли пользователь спикером
    function isUserSpeaker(userId) {
        // Проверяем, является ли пользователь спикером по данным с сервера
        for (let user of allUsers) {
            if (user.id === userId && user.is_speaker) {
                return true;
            }
        }
        return false;
    }

    // Диалог для ведущего по заявкам
    if (isHost) {
        setInterval(function() {
            fetch("/livestream/pending_requests/{{ room.id }}/")
                .then(r => r.json())
                .then(data => {
                    const dialog = document.getElementById('pending-dialog');
                    if (data.waiting && data.waiting.length) {
                        let html = '';
                        data.waiting.forEach(u => {
                            html += `<div class="pending-request">
                                <span>${u.name} просится в трансляцию</span>
                                <button onclick="approveUser(${u.id})" class="btn-approve">Принять</button>
                                <button onclick="rejectUser(${u.id})" class="btn-reject">Отклонить</button>
                            </div>`;
                        });
                        dialog.innerHTML = html;
                        dialog.style.display = 'block';
                    } else {
                        dialog.innerHTML = '';
                        dialog.style.display = 'none';
                    }
                });
        }, 3000);
    }

    window.approveUser = function(id) {
        fetch("/livestream/approve/{{ room.id }}/" + id + "/", {
            method: 'POST',
            headers: {'X-CSRFToken': '{{ csrf_token }}'}
        }).then(r => r.json()).then(data => {
            if (data.success) {
                showCustomAlert("Пользователь одобрен", "success");
            }
        });
    };
        window.rejectUser = function(id) {
        fetch("/livestream/kick/{{ room.id }}/" + id + "/", {
            method: 'POST',
            headers: {'X-CSRFToken': '{{ csrf_token }}'}
        }).then(r => r.json()).then(data => {
            if (data.success) {
                showCustomAlert("Пользователь отклонён", "info");
            }
        });
    };

    // Чат
    function loadChat() {
        fetch("/livestream/chat/{{ room.id }}/")
            .then(r => r.json())
            .then(data => {
                const chat = document.getElementById('chat-messages');
                chat.innerHTML = '';
                data.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'chat-message';
                    div.innerHTML = `<b>${msg.user}:</b> ${msg.text} <span class="chat-time">${msg.created}</span>`;
                    chat.appendChild(div);
                });
                chat.scrollTop = chat.scrollHeight;
            });
    }
    
    document.getElementById('chat-form').onsubmit = function(e) {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        
        const button = this.querySelector('button');
        button.disabled = true;
        button.textContent = 'Отправка...';
        
        fetch("/livestream/chat/{{ room.id }}/", {
            method: 'POST',
            headers: {'X-CSRFToken': '{{ csrf_token }}'},
            body: new URLSearchParams({text})
        })
        .then(r => r.json())
        .then(msg => {
            input.value = '';
            loadChat();
            button.disabled = false;
            button.textContent = 'Отправить';
        })
        .catch(error => {
            console.error("Ошибка отправки сообщения:", error);
            showCustomAlert("Не удалось отправить сообщение", "error");
            button.disabled = false;
            button.textContent = 'Отправить';
        });
    };
    
    setInterval(loadChat, 3000);
    loadChat();

    // Список пользователей
    function loadUsers() {
        fetch("/livestream/users/{{ room.id }}/")
            .then(r => r.json())
            .then(data => {
                // Сохраняем полный список пользователей
                allUsers = data.users;
                
                // Проверяем, являюсь ли я спикером
                for (let user of allUsers) {
                    if (user.id === uid) {
                        amISpeaker = user.is_speaker;
                        canEnableMic = user.can_enable_mic;
                        canEnableCamera = user.can_enable_camera;
                        handRaised = user.hand_raised;
                        break;
                    }
                }
                
                // Обновляем кнопку "Вернуть слово"
                updateReturnWordButton();
                
                // Обновляем кнопки микрофона и камеры
                updateMicCameraButtons();
                
                // Обновляем кнопку "Поднять руку"
                updateHandButton();
                
                // Получаем текущий поисковый запрос
                const searchQuery = document.getElementById('invite-search').value.trim().toLowerCase();
                
                // Фильтруем пользователей по поисковому запросу
                let filteredUsers = allUsers;
                if (searchQuery) {
                    filteredUsers = allUsers.filter(user => 
                        user.name.toLowerCase().includes(searchQuery)
                    );
                }
                
                const users = document.getElementById('users-list');
                users.innerHTML = '';
                
                // Сначала отображаем ведущего
                filteredUsers.forEach(u => {
                    if (u.is_host) {
                        renderUserRow(u, users);
                    }
                });
                
                // Затем спикеров
                filteredUsers.forEach(u => {
                    if (!u.is_host && u.is_speaker) {
                        renderUserRow(u, users);
                    }
                });
                
                // Затем остальных пользователей
                filteredUsers.forEach(u => {
                    if (!u.is_host && !u.is_speaker) {
                        renderUserRow(u, users);
                    }
                });
                
                // Обрабатываем ожидающих одобрения
                if (isHost && data.waiting && data.waiting.length) {
                    data.waiting.forEach(u => {
                        const waitingRow = document.createElement('div');
                        waitingRow.className = 'user-row waiting';
                        waitingRow.innerHTML = `
                            <span class="waiting-user">${u.name} просится в трансляцию</span>
                            <div class="user-actions">
                                <button onclick="approveUser(${u.id})" class="btn-approve">Одобрить</button>
                                <button onclick="rejectUser(${u.id})" class="btn-reject">Отклонить</button>
                            </div>
                        `;
                        users.appendChild(waitingRow);
                    });
                }
                
                // Обновляем статус говорящего, если он изменился
                updateSpeakerStatus(data.users);
                
                // Обновляем видео контейнеры
                updateVideoContainers();
            })
            .catch(error => {
                console.error("Ошибка загрузки списка пользователей:", error);
            });
    }
    
    function renderUserRow(user, container) {
        const row = document.createElement('div');
        row.className = 'user-row';
        row.dataset.userId = user.id;
        row.dataset.isSpeaker = user.is_speaker;
        
        let userIcons = '';
        if (user.is_host) {
            userIcons += '<span class="icon-host" title="Ведущий">👑</span>';
        }
        if (user.is_speaker) {
            userIcons += '<span class="icon-speaker" title="Говорит">🎙️</span>';
        }
        if (user.is_muted) {
            userIcons += '<span class="icon-muted" title="Микрофон выключен">🔇</span>';
        }
        if (user.hand_raised) {
            userIcons += '<span class="icon-hand-raised" title="Поднял руку">✋</span>';
        }
        
        let html = `<span class="user-name-row">${user.name} ${userIcons}</span>`;
        
        // Добавляем кнопки управления для ведущего
        if (isHost && user.id !== uid) {
            html += `<div class="user-actions">`;
            
            if (roomType === 'broadcast') {
                html += `<button onclick="grantUser(${user.id})" class="${user.is_speaker ? 'btn-revoke' : 'btn-grant'}">${user.is_speaker ? 'Забрать слово' : 'Дать слово'}</button>`;
            }
            
            html += `<button onclick="muteUser(${user.id})" class="btn-mute">${user.is_muted ? 'Включить' : 'Выключить'} микрофон</button>`;
            html += `<button onclick="togglePermission(${user.id}, 'mic')" class="btn-permission">${user.can_enable_mic ? 'Запретить' : 'Разрешить'} микрофон</button>`;
            html += `<button onclick="togglePermission(${user.id}, 'camera')" class="btn-permission">${user.can_enable_camera ? 'Запретить' : 'Разрешить'} камеру</button>`;
            html += `<button onclick="kickUser(${user.id})" class="btn-kick">Исключить</button>`;
            html += `</div>`;
        }
        
        row.innerHTML = html;
        container.appendChild(row);
    }
    
    function updateSpeakerStatus(users) {
        let speakerName = null;
        let speakerId = null;
        let hostId = parseInt("{{ room.host.id }}");
        
        users.forEach(u => {
            if (u.is_speaker && u.id !== hostId) {
                speakerName = u.name;
                speakerId = u.id;
            }
        });
        
        // Обновляем статус говорящего
        if (speakerName && speakerId !== currentSpeakerId) {
            document.getElementById('speaker-status').innerHTML = `Сейчас говорит: <b>${speakerName}</b>`;
            currentSpeakerId = speakerId;
        } else if (!speakerName && currentSpeakerId && currentSpeakerId !== hostId) {
            // Если нет спикера, но есть ведущий, показываем его
            const host = users.find(u => u.is_host);
            if (host) {
                document.getElementById('speaker-status').innerHTML = `Ведущий: <b>${host.name}</b>`;
            } else {
                document.getElementById('speaker-status').innerHTML = '';
            }
            currentSpeakerId = null;
        }
    }
    
    function updateVideoContainers() {
        const videoArea = document.getElementById('agora-video');
        const videoPlayers = videoArea.querySelectorAll('.video-player');
        
        if (roomType === 'broadcast') {
            // В режиме трансляции показываем только ведущего или спикера на весь экран
            videoPlayers.forEach(player => {
                const userId = parseInt(player.id.replace('user-', ''));
                const isRoomHost = userId === parseInt("{{ room.host.id }}");
                const isSpeaker = isUserSpeaker(userId);
                
                if (isRoomHost || isSpeaker) {
                    player.classList.add('speaking');
                } else {
                    player.classList.remove('speaking');
                }
            });
        } else {
            // В режиме конференции показываем всех участников
            videoPlayers.forEach(player => {
                player.classList.remove('speaking');
            });
        }
    }
    
    // Запускаем первую загрузку пользователей
    loadUsers();
    // Устанавливаем интервал обновления списка пользователей
    setInterval(loadUsers, 3000);
    
    // Функции управления пользователями
    window.kickUser = function(id) {
        fetch("/livestream/kick/{{ room.id }}/" + id + "/", {
            method: 'POST', 
            headers: {'X-CSRFToken': '{{ csrf_token }}'}
        })
        .then(response => {
            if (response.ok) {
                loadUsers();
                showCustomAlert("Пользователь исключён", "success");
                
                // Если исключили нас, перенаправляем на список трансляций
                if (id == uid) {
                    showCustomAlert("Вы были исключены из трансляции", "error");
                    setTimeout(() => {
                        window.location.href = "{% url 'livestream_list' %}";
                    }, 2000);
                }
            } else {
                showCustomAlert("Не удалось исключить пользователя", "error");
            }
        })
        .catch(error => {
            console.error("Ошибка исключения пользователя:", error);
            showCustomAlert("Ошибка при исключении пользователя", "error");
        });
    };
    
    window.muteUser = function(id) {
        fetch("/livestream/mute/{{ room.id }}/" + id + "/", {
            method: 'POST', 
            headers: {'X-CSRFToken': '{{ csrf_token }}'}
        })
        .then(response => {
            if (response.ok) {
                loadUsers();
                showCustomAlert("Статус микрофона изменен", "success");
            } else {
                showCustomAlert("Не удалось изменить статус микрофона", "error");
            }
        })
        .catch(error => {
            console.error("Ошибка изменения статуса микрофона:", error);
            showCustomAlert("Ошибка при изменении статуса микрофона", "error");
        });
    };
    
    window.grantUser = function(id) {
        fetch("/livestream/grant/{{ room.id }}/" + id + "/", {
            method: 'POST', 
            headers: {'X-CSRFToken': '{{ csrf_token }}'}
        })
        .then(response => {
            if (response.ok) {
                loadUsers();
                showCustomAlert("Статус спикера изменен", "success");
                
                // Если это я получил/потерял слово
                if (id == uid) {
                    amISpeaker = !amISpeaker;
                    updateReturnWordButton();
                    
                    if (amISpeaker) {
                        showCustomAlert("Вам дали слово! Теперь вы можете говорить.", "success");
                    } else {
                        showCustomAlert("У вас забрали слово.", "info");
                    }
                }
            } else {
                showCustomAlert("Не удалось изменить статус спикера", "error");
            }
        })
        .catch(error => {
            console.error("Ошибка изменения статуса спикера:", error);
            showCustomAlert("Ошибка при изменении статуса спикера", "error");
        });
    };
    
    window.togglePermission = function(id, device) {
        fetch(`/livestream/toggle_permission/{{ room.id }}/${id}/${device}/`, {
            method: 'POST', 
            headers: {'X-CSRFToken': '{{ csrf_token }}'}
        })
        .then(response => {
            if (response.ok) {
                loadUsers();
                showCustomAlert(`Права на ${device === 'mic' ? 'микрофон' : 'камеру'} изменены`, "success");
            } else {
                showCustomAlert("Не удалось изменить права", "error");
            }
        })
        .catch(error => {
            console.error("Ошибка изменения прав:", error);
            showCustomAlert("Ошибка при изменении прав", "error");
        });
    };
});
</script>
