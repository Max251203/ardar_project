{% extends "base.html" %}
{% block title %}{{ room.name }} — Трансляция{% endblock %}
{% block content %}
<div class="livestream-main">
    <div class="video-block">
        <div id="agora-video" class="video-area"></div>
        <div class="video-controls">
            <button id="mic-btn" class="control-btn" title="Включить/выключить микрофон">
                <i class="mic-icon">🎤</i>
            </button>
            <button id="camera-btn" class="control-btn" title="Включить/выключить камеру">
                <i class="camera-icon">📹</i>
            </button>
            <button id="leave-btn" class="control-btn leave" title="Покинуть трансляцию">
                <i class="leave-icon">❌</i> Выйти
            </button>
        </div>
        <div class="status-bar" id="status-bar">
            {% if is_host %}
                <span class="status-host">Вы — ведущий</span>
            {% else %}
                <span class="status-viewer">Вы — участник</span>
            {% endif %}
            <span id="host-status"></span>
        </div>
    </div>
    <div class="side-panel">
        <div class="users-panel">
            <div class="users-header">
                <input type="text" id="invite-search" placeholder="Поиск пользователя..." autocomplete="off">
            </div>
            <div class="users-list" id="users-list"></div>
        </div>
        <div class="chat-panel">
            <div class="chat-messages" id="chat-messages"></div>
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Сообщение..." autocomplete="off">
                <button type="submit">Отправить</button>
            </form>
        </div>
    </div>
</div>
{% if is_host %}
<div class="host-controls" style="margin-top: 20px; text-align: center;">
    <a href="{% url 'end_livestream' room.id %}" class="btn-end" onclick="return confirm('Вы уверены, что хотите завершить трансляцию?')">Завершить трансляцию</a>
</div>
{% endif %}
<div id="custom-alert" class="custom-alert" style="display:none;"></div>
<script src="https://cdn.agora.io/sdk/release/AgoraRTC_N.js"></script>
<script>
const appId = "{{ app_id }}";
const channel = "{{ channel_id }}";
const uid = parseInt("{{ user_id }}");
const userName = "{{ user_name }}";
const isHost = {{ is_host|yesno:"true,false" }};
const roomType = "{{ room.type }}";
let token = "";
let localTracks = { audioTrack: null, videoTrack: null };
let localTrackState = { audioTrackMuted: false, videoTrackMuted: false };
let remoteUsers = {};

function showCustomAlert(msg) {
    let alertDiv = document.getElementById('custom-alert');
    alertDiv.innerHTML = msg;
    alertDiv.style.display = 'block';
    setTimeout(() => { alertDiv.style.display = 'none'; }, 3000);
}

document.addEventListener('DOMContentLoaded', async function() {
    const role = isHost ? 1 : 2;
    const response = await fetch("{% url 'generate_token' %}?channel=" + channel + "&uid=" + uid + "&role=" + role);
    const data = await response.json();
    token = data.token;

    const client = AgoraRTC.createClient({ mode: roomType === 'broadcast' ? 'live' : 'rtc', codec: 'vp8' });
    if (roomType === 'broadcast') {
        client.setClientRole(isHost ? 'host' : 'audience');
    }
    await client.join(appId, channel, token, uid);

    if (isHost || roomType === 'conference') {
        [localTracks.audioTrack, localTracks.videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
        showVideo(uid, userName + " (Вы)");
        localTracks.videoTrack.play(`video-box-${uid}`);
        await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
    } else {
        document.getElementById('mic-btn').style.display = 'none';
        document.getElementById('camera-btn').style.display = 'none';
    }

    document.getElementById('mic-btn').addEventListener('click', async function() {
        if (!localTracks.audioTrack) return;
        if (localTrackState.audioTrackMuted) {
            await localTracks.audioTrack.setMuted(false);
            localTrackState.audioTrackMuted = false;
            this.classList.remove('muted');
            this.querySelector('.mic-icon').textContent = '🎤';
        } else {
            await localTracks.audioTrack.setMuted(true);
            localTrackState.audioTrackMuted = true;
            this.classList.add('muted');
            this.querySelector('.mic-icon').textContent = '🔇';
        }
    });

    document.getElementById('camera-btn').addEventListener('click', async function() {
        if (!localTracks.videoTrack) return;
        if (localTrackState.videoTrackMuted) {
            await localTracks.videoTrack.setMuted(false);
            localTrackState.videoTrackMuted = false;
            this.classList.remove('muted');
            this.querySelector('.camera-icon').textContent = '📹';
        } else {
            await localTracks.videoTrack.setMuted(true);
            localTrackState.videoTrackMuted = true;
            this.classList.add('muted');
            this.querySelector('.camera-icon').textContent = '🚫';
        }
    });

    document.getElementById('leave-btn').addEventListener('click', async function() {
        for (const trackName in localTracks) {
            const track = localTracks[trackName];
            if (track) {
                track.stop();
                track.close();
                localTracks[trackName] = null;
            }
        }
        await client.leave();
        window.location.href = "{% url 'livestream_list' %}";
    });

    client.on('user-published', async (user, mediaType) => {
        await client.subscribe(user, mediaType);
        if (mediaType === 'video') {
            showVideo(user.uid, user.userAccount || user.uid);
            user.videoTrack.play(`video-box-${user.uid}`);
        }
        if (mediaType === 'audio') {
            user.audioTrack.play();
        }
        remoteUsers[user.uid] = user;
    });

    client.on('user-unpublished', (user, mediaType) => {
        if (mediaType === 'video') {
            removeVideo(user.uid);
        }
        if (!user.hasAudio && !user.hasVideo) {
            delete remoteUsers[user.uid];
        }
    });

    function showVideo(uid, label) {
        let container = document.getElementById(`user-${uid}`);
        if (!container) {
            container = document.createElement('div');
            container.id = `user-${uid}`;
            container.classList.add('video-player');
            container.innerHTML = `<div class="user-name">${label}</div><div id="video-box-${uid}" class="video-box"></div>`;
            document.getElementById('agora-video').append(container);
        }
    }
    function removeVideo(uid) {
        const container = document.getElementById(`user-${uid}`);
        if (container) container.remove();
    }

    // Чат
    function loadChat() {
        fetch("{% url 'livestream_chat' room.id %}")
            .then(r => r.json())
            .then(data => {
                const chat = document.getElementById('chat-messages');
                chat.innerHTML = '';
                data.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'chat-message';
                    div.innerHTML = `<b>${msg.user}:</b> ${msg.text} <span class="chat-time">${msg.created}</span>`;
                    chat.appendChild(div);
                });
                chat.scrollTop = chat.scrollHeight;
            });
    }
    document.getElementById('chat-form').onsubmit = function(e) {
        e.preventDefault();
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        fetch("{% url 'livestream_chat' room.id %}", {
            method: 'POST',
            headers: {'X-CSRFToken': '{{ csrf_token }}'},
            body: new URLSearchParams({text})
        })
        .then(r => r.json())
        .then(msg => {
            input.value = '';
            loadChat();
        });
    };
    setInterval(loadChat, 3000);
    loadChat();

    // Список пользователей
    function loadUsers() {
        fetch("{% url 'livestream_users' room.id %}")
            .then(r => r.json())
            .then(data => {
                const users = document.getElementById('users-list');
                users.innerHTML = '';
                data.users.forEach(u => {
                    let html = `<div class="user-row"><span>${u.name}`;
                    if (u.is_host) html += ' <b>(Ведущий)</b>';
                    if (u.is_speaker) html += ' <i>(Говорит)</i>';
                    if (u.is_muted) html += ' <i>(Микрофон выкл.)</i>';
                    html += '</span>';
                    if (isHost && !u.is_host) {
                        html += `<button onclick="kickUser(${u.id})">Выгнать</button>
                                 <button onclick="muteUser(${u.id})">${u.is_muted ? 'Включить' : 'Выключить'} микрофон</button>`;
                        if (roomType === 'broadcast') {
                            html += `<button onclick="grantUser(${u.id})">${u.is_speaker ? 'Забрать слово' : 'Дать слово'}</button>`;
                        }
                    }
                    html += '</div>';
                    users.innerHTML += html;
                });
                // waiting approval
                if (isHost && data.waiting.length) {
                    data.waiting.forEach(u => {
                        let html = `<div class="user-row waiting">
                            <span>${u.name} просится обратно</span>
                            <button onclick="approveUser(${u.id})">Одобрить</button>
                        </div>`;
                        users.innerHTML += html;
                    });
                }
            });
    }
    setInterval(loadUsers, 3000);
    loadUsers();
    window.kickUser = function(id) {
        fetch("{% url 'livestream_kick' room.id 0 %}".replace('/0/', '/' + id + '/'), {method: 'POST', headers: {'X-CSRFToken': '{{ csrf_token }}'}}).then(() => {
            loadUsers();
            showCustomAlert("Пользователь исключён!");
        });
    }
    window.muteUser = function(id) {
        fetch("{% url 'livestream_mute' room.id 0 %}".replace('/0/', '/' + id + '/'), {method: 'POST', headers: {'X-CSRFToken': '{{ csrf_token }}'}}).then(loadUsers);
    }
    window.grantUser = function(id) {
        fetch("{% url 'livestream_grant' room.id 0 %}".replace('/0/', '/' + id + '/'), {method: 'POST', headers: {'X-CSRFToken': '{{ csrf_token }}'}}).then(loadUsers);
    }
    window.approveUser = function(id) {
        fetch("{% url 'livestream_approve' room.id 0 %}".replace('/0/', '/' + id + '/'), {method: 'POST', headers: {'X-CSRFToken': '{{ csrf_token }}'}}).then(loadUsers);
    }

    // Приглашения
    document.getElementById('invite-search').oninput = function() {
        const q = this.value;
        fetch("{% url 'livestream_invite' room.id %}?q=" + encodeURIComponent(q))
            .then(r => r.json())
            .then(data => {
                const res = document.getElementById('invite-results');
                res.innerHTML = '';
                data.results.forEach(u => {
                    const btn = document.createElement('button');
                    btn.textContent = 'Пригласить';
                    btn.onclick = function() {
                        fetch("{% url 'livestream_invite' room.id %}", {
                            method: 'POST',
                            headers: {'X-CSRFToken': '{{ csrf_token }}'},
                            body: new URLSearchParams({user_id: u.id})
                        }).then(() => { btn.textContent = 'Приглашён'; btn.disabled = true; });
                    };
                    res.innerHTML += `<div>${u.name} </div>`;
                    res.lastChild.appendChild(btn);
                });
            });
    };
});
</script>
<style>
.livestream-main { display: flex; gap: 20px; }
.video-block { flex: 2; min-width: 600px; }
.video-area { width: 100%; height: 400px; background: #222; border-radius: 10px; margin-bottom: 10px; }
.video-player { position: relative; background-color: #2a2a2a; border-radius: 6px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 10px; }
.video-box { width: 100%; height: 240px; background: #111; border-radius: 8px; overflow: hidden; }
.user-name { position: absolute; bottom: 10px; left: 10px; background-color: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 4px; font-size: 14px; }
.video-controls { display: flex; gap: 10px; margin-bottom: 10px; }
.control-btn { padding: 10px 18px; border-radius: 6px; border: none; background: #2563eb; color: #fff; font-size: 18px; cursor: pointer; }
.control-btn.leave { background: #ef4444; }
.control-btn.muted { background: #aaa; }
.status-bar { margin-bottom: 10px; }
.status-host { color: #2563eb; font-weight: bold; }
.status-viewer { color: #aaa; }
.side-panel { flex: 1; min-width: 350px; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
.users-panel { background: var(--card); border-radius: 8px; padding: 10px; height: 250px; display: flex; flex-direction: column; }
.users-header { margin-bottom: 8px; }
.users-list { flex: 1; overflow-y: auto; }
.user-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.user-row button { font-size: 13px; padding: 4px 10px; border-radius: 4px; border: none; background: #2563eb; color: #fff; cursor: pointer; height: 32px; min-width: 90px; margin-right: 4px; display: inline-block; vertical-align: middle; }
.user-row button:last-child { margin-right: 0; }
.user-row .kick-btn { background: #ef4444; }
.user-row .kick-btn:hover { background: #b91c1c; }
.user-row .grant-btn { background: #10b981; }
.user-row .grant-btn:hover { background: #047857; }
.user-row .mute-btn { background: #f59e0b; }
.user-row .mute-btn:hover { background: #b45309; }
.user-row .waiting { color: #f59e0b; font-style: italic; }
.invite-panel { margin-top: 8px; }
#invite-search { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid var(--border); }
#invite-results div { margin-bottom: 5px; }
.chat-panel { background: var(--card); border-radius: 8px; padding: 10px; height: 250px; display: flex; flex-direction: column; }
.chat-messages { flex: 1; overflow-y: auto; margin-bottom: 10px; }
.chat-message { margin-bottom: 5px; }
.chat-time { color: #aaa; font-size: 11px; margin-left: 5px; }
.chat-form { display: flex; gap: 5px; }
#chat-input { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid var(--border); }
.btn-end { display: inline-block; padding: 12px 24px; background-color: #e53e3e; color: white; border-radius: 6px; font-weight: 500; }
.custom-alert { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #ef4444; color: #fff; padding: 18px 32px; border-radius: 8px; font-size: 18px; z-index: 9999; box-shadow: 0 2px 12px rgba(0,0,0,0.2); animation: fadeInOut 2.5s; }
@keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
</style>
{% endblock %}
